display_information:
  name: SandyBot
  description: Generates knowledge base docs on demand
  background_color: "#4A154B"

features:
  bot_user:
    display_name: SandyBot
    always_online: true
  slash_commands:
    - command: /sandybox
      description: Generate a knowledge base doc
      usage_hint: "<concept>[, concept2, ...] [in <section>]"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - chat:write
      - commands

settings:
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
